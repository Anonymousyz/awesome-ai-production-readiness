<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Awesome AI Production Readiness catalog map</title>
  <desc id="desc">A map of 57 resources across eleven production-readiness sections; every URL and all 46 GitHub metadata records passed the strict release-time check.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#111b32"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1" opacity=".5"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/><rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="58" y="44" width="1084" height="542" rx="26" fill="#0f172a" stroke="#24324a"/>
  <text x="92" y="91" fill="#67e8f9" font-family="Segoe UI,Arial" font-size="15" font-weight="700" letter-spacing="2">MACHINE-READABLE · STRICTLY VERIFIED · v0.3.4</text>
  <text x="92" y="145" fill="#f8fafc" font-family="Segoe UI,Arial" font-size="41" font-weight="750">57 resources for production-ready AI</text>
  <text x="92" y="181" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="20">Pick tools by the gap you need to close, not by popularity.</text>
  <g font-family="Segoe UI,Arial">
    <rect x="92" y="224" width="270" height="292" rx="20" fill="#0b2635" stroke="#22d3ee" stroke-width="2"/>
    <text x="126" y="285" fill="#f8fafc" font-size="78" font-weight="800">57</text><text x="126" y="323" fill="#67e8f9" font-size="17" font-weight="700">CURATED RESOURCES</text>
    <line x1="126" y1="353" x2="328" y2="353" stroke="#334155"/>
    <text x="126" y="394" fill="#f8fafc" font-size="34" font-weight="750">46 / 46</text><text x="126" y="423" fill="#94a3b8" font-size="14">GitHub metadata verified</text>
    <text x="126" y="472" fill="#6ee7b7" font-size="20" font-weight="700">0 hard failures</text>

    <text x="411" y="236" fill="#cbd5e1" font-size="14" font-weight="700">CATALOG SECTIONS</text>
    <g fill="#94a3b8" font-size="13">
      <text x="411" y="273">Evaluation &amp; testing</text><text x="411" y="305">Governance</text><text x="411" y="337">RAG &amp; agents</text><text x="411" y="369">Deployment &amp; MLOps</text><text x="411" y="401">Observability</text><text x="411" y="433">Guardrails</text><text x="411" y="465">Security &amp; risk</text><text x="411" y="497">Documentation</text><text x="411" y="529">Human-centered + FDE + checklists</text>
    </g>
    <g fill="url(#bar)">
      <rect x="620" y="260" width="400" height="16" rx="8"/><rect x="620" y="292" width="350" height="16" rx="8"/><rect x="620" y="324" width="350" height="16" rx="8"/><rect x="620" y="356" width="350" height="16" rx="8"/><rect x="620" y="388" width="300" height="16" rx="8"/><rect x="620" y="420" width="300" height="16" rx="8"/><rect x="620" y="452" width="300" height="16" rx="8"/><rect x="620" y="484" width="200" height="16" rx="8"/><rect x="620" y="516" width="300" height="16" rx="8"/>
    </g>
    <g fill="#e2e8f0" font-size="13" font-weight="700"><text x="1035" y="273">8</text><text x="985" y="305">7</text><text x="985" y="337">7</text><text x="985" y="369">7</text><text x="935" y="401">6</text><text x="935" y="433">6</text><text x="935" y="465">6</text><text x="835" y="497">4</text><text x="935" y="529">6</text></g>
  </g>
  <rect x="92" y="557" width="1016" height="4" rx="2" fill="url(#bar)"/>
