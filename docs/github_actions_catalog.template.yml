# GitHub Actions catalog validation template.
#
# To enable, copy this file to `.github/workflows/catalog.yml` using a token
# with GitHub's `workflow` scope. External link checking is scheduled rather
# than run on every push to reduce flaky failures.

name: catalog-validation

on:
  push:
  pull_request:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rebuild catalog using the committed review date
        run: |
          CURATED_AT=$(python -c "import json; print(json.load(open('data/resources.json', encoding='utf-8'))['curated_at'])")
          python scripts/export_resources.py --curated-at "$CURATED_AT"
      - run: python -m unittest discover -s tests -v
      - run: git diff --exit-code -- data/resources.json

  links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Strict live link and GitHub metadata check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_links.py --output data/link-check-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: data/link-check-report.json
